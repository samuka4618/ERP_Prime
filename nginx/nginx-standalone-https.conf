# ERP PRIME - Nginx com HTTPS para erp.empresa.local
# Use após rodar: npm run generate:ssl-cert
# Início: nginx -c "caminho/para/nginx-standalone-https.conf"

worker_processes 1;
events {
    worker_connections 1024;
}

http {
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # HTTP - localhost (porta 80)
    server {
        listen 80;
        server_name localhost;
        client_max_body_size 50M;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # Redirecionar erp.empresa.local:80 → HTTPS
    server {
        listen 80;
        server_name erp.empresa.local;
        return 301 https://$host$request_uri;
    }

    # HTTPS - erp.empresa.local (certificado autoassinado)
    server {
        listen 443 ssl;
        server_name erp.empresa.local;

        include ssl-cert.conf;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        client_max_body_size 50M;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
