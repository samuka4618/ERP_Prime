# Fly.io - backend ERP Prime (frontend na Vercel)
# https://fly.io/docs/reference/configuration/
app = "erp-prime-api"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Descomente após criar o volume: fly volumes create data --region gru
# [mounts]
#   source = "data"
#   destination = "/data"
